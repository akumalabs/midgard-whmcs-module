name: Release ZIP

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installable ZIP
        run: |
          mkdir -p dist
          zip -r "dist/midgard-whmcs-module-${GITHUB_REF_NAME}.zip" modules/servers/midgard

      - name: Smoke check ZIP structure
        run: |
          unzip -l "dist/midgard-whmcs-module-${GITHUB_REF_NAME}.zip" | grep "modules/servers/midgard/midgard.php"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: midgard-whmcs-module-${{ github.ref_name }}
          path: dist/midgard-whmcs-module-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || github.token }}
          files: dist/midgard-whmcs-module-${{ github.ref_name }}.zip
          body: |
            Automated release for `${{ github.ref_name }}`.

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.API_SERVER_SSH_KEY }}" > ~/.ssh/api_server_key
          chmod 600 ~/.ssh/api_server_key
          ssh-keyscan -H ${{ secrets.API_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to API server
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SSH="ssh -i ~/.ssh/api_server_key -o StrictHostKeyChecking=no root@${{ secrets.API_SERVER_HOST }}"
          SCP="scp -i ~/.ssh/api_server_key -o StrictHostKeyChecking=no"

          # Ensure directory exists
          $SSH "mkdir -p /var/www/midgard-api/storage/app/releases/whmcs"

          # Upload ZIP
          $SCP "dist/midgard-whmcs-module-${VERSION}.zip" \
            root@${{ secrets.API_SERVER_HOST }}:/var/www/midgard-api/storage/app/releases/whmcs/"${VERSION}.zip"

          # Set latest symlink + permissions
          $SSH "cd /var/www/midgard-api/storage/app/releases/whmcs \
            && ln -sf ${VERSION}.zip latest.zip \
            && chown -R www-data:www-data /var/www/midgard-api/storage/app/releases"

          # Cleanup old releases (keep last 5)
          $SSH "cd /var/www/midgard-api/storage/app/releases/whmcs \
            && ls -t *.zip | grep -v latest | tail -n +6 | xargs -r rm -f \
            && echo 'Cleaned up old releases'"

          echo "✓ Released ${VERSION} → latest.zip"
